version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 30s
      retries: 3

  cpp-receiver:
    build:
      context: ./cpp
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "514:514/udp"
      - "515:515/tcp"

  go-consumer:
    build:
      context: ./go
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_ADDR=redis:6379
      - GRPC_PORT=:50051
    ports:
      - "50051:50051"

  node-api:
    build:
      context: ./nodejs
      dockerfile: Dockerfile
    depends_on:
      - go-consumer
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GRPC_HOST=go-consumer
      - GRPC_PORT=50051
      - HTTP_PORT=3000
    ports:
      - "3000:3000"

volumes:
  redis_data: